<!DOCTYPE html>
<html lang="en">
<head>
  <script data-goatcounter="https://dbus-donostia.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DBus Donostia</title>

  <!-- PWA: iOS Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DBus Donostia">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">

  <!-- Theme -->
  <meta name="theme-color" content="#1a73e8" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>🚌 DBus Donostia</h1>
    <p class="subtitle" data-i18n="subtitle">Real-time bus arrivals</p>
    <div class="lang-toggle" id="lang-toggle">
      <button data-lang="es">🇪🇸 ES</button>
      <span>|</span>
      <button data-lang="eu"><img src="/icons/basque-flag.svg" class="lang-flag" alt="Basque flag"> EU</button>
      <span>|</span>
      <button data-lang="en">🇬🇧 EN</button>
    </div>
  </header>

  <main>
    <section class="stop-selector">
      <label for="stop-input" data-i18n="stopLabel">Bus stop</label>
      <div class="input-row">
        <input
          id="stop-input"
          type="text"
          list="stops-list"
          placeholder="Type a stop name…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <button id="locate-btn" class="locate-btn" type="button">📍 Find nearest stops</button>
      <datalist id="stops-list"></datalist>
      <p id="stop-status" class="hint"></p>
      <div id="nearest-stops" hidden></div>
    </section>

    <section class="arrivals-section" hidden>
      <div class="arrivals-header">
        <h2 id="arrivals-title">Next buses</h2>
        <span id="refresh-indicator" class="refresh-dot" title="Refreshing…"></span>
      </div>
      <div id="arrivals-board"></div>
      <p id="last-updated" class="hint"></p>
    </section>
  </main>

  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch((err) => {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
